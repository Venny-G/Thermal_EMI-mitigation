name: Dual Thruster Interaction
description: >
  Two thrusters with modest cant angle to show plume overlap and elevated
  subsystem exposure between the nozzles.
bus:
  width_m: 1.20
  height_m: 1.00
  grid_resolution: 240
thrusters:
  - name: T1
    x_m: 0.28
    y_m: 0.36
    orientation_deg: 6.0
    power_kw: 4.2
    plume_half_angle_deg: 18.0
    thermal_decay_m: 0.26
    emi_decay_m: 0.17
  - name: T2
    x_m: 0.28
    y_m: 0.64
    orientation_deg: -6.0
    power_kw: 4.2
    plume_half_angle_deg: 18.0
    thermal_decay_m: 0.26
    emi_decay_m: 0.17
subsystems:
  - name: Avionics Bay
    x_m: 0.80
    y_m: 0.50
    thermal_limit: 2.20
    emi_limit: 1.20
    criticality: 1.00
    thermal_shielding: 0.10
    emi_shielding: 0.15
    failure_mode: Control electronics upset or intermittent resets.
  - name: Propulsion PPU
    x_m: 0.63
    y_m: 0.50
    thermal_limit: 2.40
    emi_limit: 1.30
    criticality: 0.95
    thermal_shielding: 0.05
    emi_shielding: 0.10
    failure_mode: Power electronics derating or trip events.
  - name: Battery Pack
    x_m: 0.82
    y_m: 0.22
    thermal_limit: 1.85
    emi_limit: 1.65
    criticality: 0.90
    thermal_shielding: 0.10
    emi_shielding: 0.05
    failure_mode: Thermal margin loss and accelerated cell aging.
